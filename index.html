<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>님비레일 시간표</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nimbi_rail.css">
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#161b22">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="님비레일">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
<header>
  <div class="logo"><div class="logo-icon">🚆</div>님비레일 시간표</div>
  <span id="header-clock" style="font-family:var(--mono);font-size:14px;font-weight:600;color:var(--text1);letter-spacing:1px"></span>
</header>
<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('train')" id="tab-train">🔢 열차</button>
    <button class="tab" onclick="switchTab('station')" id="tab-station">🏢 시간표</button>
    <button class="tab" onclick="switchTab('route')" id="tab-route">🔍 출도착</button>
    <button class="tab" onclick="switchTab('map')" id="tab-map">🗺️ 노선도</button>
    <button class="tab" onclick="switchTab('alarm')" id="tab-alarm">🔔 알람</button>
    <button class="tab" onclick="switchTab('fav')" id="tab-fav">⭐ 즐겨찾기</button>
    <button class="tab" onclick="switchTab('stats')" id="tab-stats">📊 통계</button>
    <button class="tab" onclick="switchTab('notice')" id="tab-notice">📢 공지</button>
    
  </div>

  <div class="panel active" id="panel-train">
    <div class="search-card">
      <div class="form-row">
        <div class="form-group"><label>노선</label>
          <select id="sel-line-train" onchange="selectTrainLine()">
            <option value="">노선 선택</option>
            <option value="경부선">경부선</option>
            <option value="경부고속선">경부고속선</option>
            <option value="호남선">호남선</option>
            <option value="전라선">전라선</option>
            <option value="경전선">경전선</option>
            <option value="중앙선">중앙선</option>
            <option value="동해선">동해선</option>
            <option value="강릉선">강릉선</option>
            <option value="중부내륙선">중부내륙선</option>
            <option value="경전선">경전선</option>
          </select>
        </div>
        <div class="form-group"><label>열차번호</label>
          <div class="autocomplete-wrap">
            <input type="text" id="input-trainno" placeholder="번호 직접 검색" autocomplete="off"
              onfocus="showRecentSearches('input-trainno','ac-trainno','train')"
              oninput="document.getElementById('ac-trainno').style.display='none'"
              onblur="setTimeout(()=>acHide('ac-trainno'),150)"
              onkeydown="if(event.key==='Enter')searchByTrain()">
            <div class="ac-dropdown" id="ac-trainno"></div>
          </div>
        </div>
        <button class="btn btn-primary" onclick="searchByTrain()">🔍 조회</button>
        <button class="btn-fav-add" id="fav-btn-train" onclick="addFav('train')" title="즐겨찾기 추가" style="display:none">⭐</button>
      </div>
    </div>
    <div id="train-line-list"></div>
    <div id="result-train"></div>
  </div>

  <div class="panel" id="panel-station">
    <div class="search-card">
      <div class="form-row">
        <div class="form-group"><label>역 이름</label>
          <div class="autocomplete-wrap">
            <input type="text" id="input-station" placeholder="역명 입력 (예: 대전)" autocomplete="off"
              oninput="acShow('input-station','ac-station')"
              onfocus="showRecentSearches('input-station','ac-station','station')"
              onkeydown="acKey(event,'input-station','ac-station')"
              onblur="setTimeout(()=>acHide('ac-station'),150)">
            <div class="ac-dropdown" id="ac-station"></div>
          </div>
        </div>
        <button class="btn btn-primary" onclick="searchByStation()">🔍 조회</button>
        <button class="btn-fav-add" id="fav-btn-station" onclick="addFav('station')" title="즐겨찾기 추가" style="display:none">⭐</button>
        <button class="btn-filter-toggle" id="btn-filter-station" onclick="toggleStationFilter()">필터 ▾</button>
      </div>
      <div class="filter-row" id="filter-row-station">
        <div class="form-group"><label>방향</label>
          <select id="sel-dir-station">
            <option value="all">전체</option><option value="down">하행</option><option value="up">상행</option>
          </select>
        </div>
        <div class="form-group"><label>통과 열차</label>
          <select id="sel-pass-station">
            <option value="all">포함</option>
            <option value="stop">정차만</option>
          </select>
        </div>
        <div class="form-group"><label>등급</label>
          <select id="sel-grade-station">
            <option value="all">전체</option>
            <option value="KTX">KTX</option>
            <option value="SRT">SRT</option>
            <option value="ITX-새마을">ITX-새마을</option>
            <option value="ITX-청춘">ITX-청춘</option>
            <option value="무궁화호">무궁화호</option>
          </select>
        </div>
        <div class="form-group"><label>노선</label>
          <select id="sel-line-station">
            <option value="all">전체</option>
            <option value="경부선">경부선</option>
            <option value="경부고속선">경부고속선</option>
            <option value="호남선">호남선</option>
            <option value="전라선">전라선</option>
            <option value="경전선">경전선</option>
            <option value="중앙선">중앙선</option>
            <option value="동해선">동해선</option>
            <option value="강릉선">강릉선</option>
            <option value="중부내륙선">중부내륙선</option>
          </select>
        </div>
        <div class="form-group"><label>당역 종착</label>
          <select id="sel-terminus-station">
            <option value="all">포함</option>
            <option value="exclude">제외</option>
          </select>
        </div>
        <div class="form-group"><label>심야 열차</label>
          <select id="sel-night-station">
            <option value="all">전체</option>
            <option value="only">심야만</option>
            <option value="highlight">하이라이트</option>
          </select>
        </div>
        <div class="form-group"><label>시간 이후</label>
          <input type="text" id="input-after-time" placeholder="예: 9:00" style="width:80px"
            onkeydown="if(event.key==='Enter')searchByStation()">
        </div>
      </div>
    </div>
    <div id="result-station"></div>
  </div>

  <div class="panel" id="panel-route">
    <div class="search-card">
      <!-- 출발/도착역: PC는 가로, 모바일은 세로 -->
      <div class="route-inputs">
        <div class="form-group"><label>출발역</label>
          <div class="autocomplete-wrap">
            <input type="text" id="input-from" placeholder="출발역 입력" autocomplete="off"
              oninput="acShow('input-from','ac-from')"
              onkeydown="acKey(event,'input-from','ac-from')"
              onblur="setTimeout(()=>acHide('ac-from'),150)">
            <div class="ac-dropdown" id="ac-from"></div>
          </div>
        </div>
        <div class="form-group"><label>도착역</label>
          <div class="autocomplete-wrap">
            <input type="text" id="input-to" placeholder="도착역 입력" autocomplete="off"
              oninput="acShow('input-to','ac-to')"
              onkeydown="acKey(event,'input-to','ac-to')"
              onblur="setTimeout(()=>acHide('ac-to'),150)">
            <div class="ac-dropdown" id="ac-to"></div>
          </div>
        </div>
        <!-- 검색 버튼: PC는 입력창 오른쪽, 모바일은 아래 -->
        <div class="route-btn-group">
          <button class="btn btn-primary" onclick="searchByRoute()" style="white-space:nowrap">🔍 검색</button>
          <button class="btn-filter-toggle" id="btn-filter-route" onclick="toggleRouteFilter()">필터 ▾</button>
          <button class="btn-fav-add" id="fav-btn-route" onclick="addFav('route')" title="즐겨찾기" style="display:none">⭐</button>
        </div>
      </div>
      <!-- 접기/펼치기 필터 (시간이후 포함) -->
      <div class="filter-row" id="filter-row-route">
        <div class="form-group">
          <label>시간 이후</label>
          <input type="text" id="input-after-route" placeholder="예: 9:00" style="width:80px"
            onkeydown="if(event.key==='Enter')searchByRoute()">
        </div>
        <div class="form-group">
          <label>정렬</label>
          <select id="sel-sort-route">
            <option value="duration">소요시간순</option>
            <option value="depart">출발시각순</option>
            <option value="arrive">도착시각순</option>
          </select>
        </div>
        <div class="form-group">
          <label>최대 소요</label>
          <select id="sel-max-duration">
            <option value="0">제한없음</option>
            <option value="60">1시간</option>
            <option value="90">1시간30분</option>
            <option value="120">2시간</option>
            <option value="180">3시간</option>
            <option value="240">4시간</option>
          </select>
        </div>
      </div>
    </div>
    <div class="filter-row" id="xfer-settings" style="display:none">
      <div class="form-group">
        <label>최소 환승 대기</label>
        <select id="xfer-min">
          <option value="3">3분</option>
          <option value="5">5분</option>
          <option value="10">10분</option>
          <option value="15">15분</option>
          <option value="20">20분</option>
        </select>
      </div>
      <div class="form-group">
        <label>최대 환승 대기</label>
        <select id="xfer-max">
          <option value="30">30분</option>
          <option value="45">45분</option>
          <option value="60" selected>60분</option>
          <option value="90">90분</option>
          <option value="120">120분</option>
        </select>
      </div>
    </div>
    
    <div id="result-route"></div>
  </div>
  <div class="panel" id="panel-map">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px">
      <div class="map-line-tabs" id="map-line-tabs" style="margin-bottom:0">
      <button class="map-line-tab active" onclick="showMapLine('gyeongbu',this)">경부선</button>
      <button class="map-line-tab" onclick="showMapLine('gyeongbuhs',this)">경부고속선</button>
      <button class="map-line-tab" onclick="showMapLine('honam',this)">호남선</button>
      <button class="map-line-tab" onclick="showMapLine('jungang',this)">중앙선</button>
      <button class="map-line-tab" onclick="showMapLine('donghae',this)">동해선</button>
      <button class="map-line-tab" onclick="showMapLine('gangreung',this)">강릉선</button>
      <button class="map-line-tab" onclick="showMapLine('jungnaelyuk',this)">중부내륙선</button>
      <button class="map-line-tab" onclick="showMapLine('gyeongjeon',this)">경전선</button>
    </div>
      </div>
      <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">
        <span id="map-train-count" class="badge blue" style="white-space:nowrap"></span>
        <button class="map-layer-btn" id="map-layer-btn" onclick="toggleMapLayer()" title="레이어 전환">🚉 역 우선</button>
        <button class="map-dir-btn active" id="map-dir-down" onclick="setMapDir('down')">하행 ↓</button>
        <button class="map-dir-btn active" id="map-dir-up" onclick="setMapDir('up')">상행 ↑</button>
        <button class="map-dir-btn" id="map-dir-all" onclick="setMapDir('all')">전체</button>
        <div style="display:flex;gap:2px;align-items:center;margin-left:4px">
          <button class="map-dir-btn" onclick="mapZoomOut()" title="축소">－</button>
          <span id="map-zoom-label" style="font-size:11px;color:var(--text2);min-width:32px;text-align:center">100%</span>
          <button class="map-dir-btn" onclick="mapZoomIn()" title="확대">＋</button>
          <button class="map-dir-btn" onclick="mapZoomReset()" title="초기화">↺</button>
        </div>
      </div>
    </div>
    <div id="map-content" style="display:none">
      <div class="map-legend" id="map-legend"></div>
      <div style="position:relative">
      <div class="map-svg-wrap" id="map-svg-wrap"><div style="padding:40px;text-align:center;color:var(--text3)">노선을 선택하세요</div></div>
    </div>
  </div>
</div>

  <div class="panel" id="panel-alarm">
    <div id="result-alarm"></div>
  </div>
  <div class="panel" id="panel-fav">
    <div id="result-fav"></div>
  </div>
  <div class="panel" id="panel-stats">
    <div id="result-stats"></div>
  </div>
  <div class="panel" id="panel-notice">
    <div id="result-notice"></div>
  </div>
  

</div>

<div class="map-popup-backdrop" id="map-backdrop" style="display:none" onclick="closeMapPopup()"></div>
<div class="map-popup" id="map-popup" style="display:none">
  <div class="map-popup-title" id="map-popup-name"></div>
  <div class="map-popup-sub" id="map-popup-sub"></div>
  <div class="map-popup-trains" id="map-popup-trains"></div>
  <button class="btn btn-primary" style="width:100%;margin-bottom:8px" onclick="goToMapStation()">🏢 시간표 보기</button>
  <button class="map-popup-close" onclick="closeMapPopup()">닫기</button>
</div>

<script src="nimbi_rail_data.js"></script>
  <script src="nimbi_rail_notices.js"></script>
  <script src="nimbi_rail.js"></script>
  <script>
  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('sw.js').then(reg => {
        // 이미 대기 중인 SW 있으면 즉시 활성화
        if(reg.waiting) reg.waiting.postMessage('skipWaiting');
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          newSW.addEventListener('statechange', () => {
            if(newSW.state === 'installed' && navigator.serviceWorker.controller){
              newSW.postMessage('skipWaiting');
            }
          });
        });
      });
      // SW에서 RELOAD 메시지 수신 시 새로고침
      navigator.serviceWorker.addEventListener('message', e=>{
        if(e.data && e.data.type==='RELOAD') location.reload();
      });
      // SW 교체되면 즉시 새로고침
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    });
  }
</script>
</body>
</html>
